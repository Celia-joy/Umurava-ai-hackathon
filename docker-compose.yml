services:
  mongo:
    image: mongo:7
    container_name: umurava-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umurava-backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/umuravaai
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umurava-frontend
    restart: unless-stopped
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:5000
      NEXT_PUBLIC_API_URL: /api/proxy
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  backend_uploads:
